<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyFind</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #counter {
      position: absolute;
      top: 20px; left: 20px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 22px;
      padding: 8px 16px;
      border-radius: 8px;
      letter-spacing: 1px;
    }
    #status {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(0,0,0,0.6);
      color: #aaffaa;
      font-size: 16px;
      padding: 8px 14px;
      border-radius: 8px;
    }
    #caught {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff2222;
      font-size: 72px;
      font-weight: bold;
      text-shadow: 0 0 20px #ff0000;
      display: none;
      letter-spacing: 4px;
    }
    #win {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0,0,0,0.85);
      color: #ffe066;
      padding: 40px 60px;
      border-radius: 16px;
      display: none;
      border: 2px solid #ffe066;
    }
    #win h1 { font-size: 48px; margin-bottom: 12px; }
    #win p { font-size: 22px; color: #fff; }
    #start {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 40px 60px;
      border-radius: 16px;
      border: 2px solid #888;
      pointer-events: all;
    }
    #start h1 { font-size: 48px; color: #ffe066; margin-bottom: 16px; }
    #start .controls { text-align: left; margin: 16px 0; line-height: 2; font-size: 16px; }
    #start button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 20px;
      background: #ffe066;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #start button:hover { background: #ffd000; }
    #floor-indicator {
      position: absolute;
      bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.6);
      color: #88ccff;
      font-size: 16px;
      padding: 6px 12px;
      border-radius: 6px;
    }
    #alert-indicator {
      position: absolute;
      bottom: 20px; right: 20px;
      background: rgba(180,0,0,0.7);
      color: #fff;
      font-size: 16px;
      padding: 6px 14px;
      border-radius: 6px;
      display: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index--7QODFXH.js"></script>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="counter">🫘 0 / 0</div>
    <div id="status">Carry: 0</div>
    <div id="caught">CAUGHT!</div>
    <div id="win">
      <h1>🎉 You did it!</h1>
      <p>All jelly beans returned to the bag!</p>
    </div>
    <div id="floor-indicator">Floor 1</div>
    <div id="alert-indicator">⚠ CATS ALERTED!</div>
    <div id="start">
      <h1>JellyFind</h1>
      <p>You've been shrunk! Collect all jelly beans<br>and return them to the bag at spawn.</p>
      <div class="controls">
        <b>WASD</b> — Move &nbsp;&nbsp; <b>Shift</b> — Run<br>
        <b>Space</b> — Jump &nbsp;&nbsp; <b>E</b> — Hide<br>
        <b>Click</b> — Lock mouse / Unlock: Esc
      </div>
      <button id="startBtn">Start Game</button>
    </div>
  </div>
</body>
</html>
